version: 2
updates:
  - package-ecosystem: npm
    directories:
      - "**/*"
    schedule:
      interval: monthly
      time: "02:00"
      timezone: Europe/Berlin
    cooldown:
      default: 7
    open-pull-requests-limit: 15
    assignees:
      - DNAngelX
    versioning-strategy: increase

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
      time: "02:00"
      timezone: Europe/Berlin
    cooldown:
      default: 7
    open-pull-requests-limit: 15
    assignees:
      - DNAngelX
